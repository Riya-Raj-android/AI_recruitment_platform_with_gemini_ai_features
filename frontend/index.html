<!DOCTYPE html>
<html>
<head>
    <title>Upload - AI Recruitment Platform</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="topbar" id="siteHeader"></header>

    <div class="page">
        <h2 class="section-title">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
            Upload Resume
        </h2>
        <p class="section-sub">Upload a candidate's resume PDF to extract skills and store it for scoring, ranking, and AI analysis.</p>

        <div class="card">
            <label for="resumeFile">Resume PDF</label>
            <input type="file" id="resumeFile" accept=".pdf">
            <button type="button" onclick="uploadResume()">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
                Upload Resume
            </button>
        </div>

        <div class="card">
            <h3><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>Result</h3>
            <div id="output" class="placeholder">No resume uploaded yet.</div>
        </div>
    </div>

    <script src="icons.js"></script>
    <script>injectHeader("index.html");</script>
    <script src="upload.js"></script>

</body>
</html>
