<!DOCTYPE html>
<html>
<head>
    <title>Ranking - AI Recruitment Platform</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="topbar" id="siteHeader"></header>

    <div class="page">
        <h2 class="section-title">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
            Candidates Ranked by ATS Score
        </h2>
        <p class="section-sub">Highest scoring candidates first, based on the most recent ATS score calculated for each.</p>

        <div class="card">
            <button type="button" class="secondary" onclick="loadRanking()">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
                Refresh
            </button>
            <div id="result" style="margin-top:16px;" class="placeholder">Loading...</div>
        </div>
    </div>

    <script src="icons.js"></script>
    <script>injectHeader("ranking.html");</script>
    <script src="ranking.js"></script>
    <script>loadRanking();</script>

</body>
</html>
