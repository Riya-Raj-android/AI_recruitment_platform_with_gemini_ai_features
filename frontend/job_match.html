<!DOCTYPE html>
<html>
<head>
    <title>Job Match - AI Recruitment Platform</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="topbar">
        <h1>AI <span>Recruitment</span> Platform</h1>
        <nav class="tabs">
            <a href="index.html">Upload</a>
            <a href="candidates.html">Candidates</a>
            <a href="ranking.html">Ranking</a>
            <a href="job_match.html" class="active">Job Match</a>
            <a href="ai_tools.html">AI Tools</a>
        </nav>
    </header>

    <div class="page">
        <h2 class="section-title">Match Candidates to a Job</h2>
        <p class="section-sub">Paste a job description and see how every uploaded candidate scores against it.</p>

        <div class="card">
            <label for="jobDescription">Job Description</label>
            <textarea id="jobDescription" placeholder="Paste the job description here..."></textarea>
            <button type="button" onclick="matchJob()">Find Matches</button>
        </div>

        <div class="card">
            <h3>Results</h3>
            <div id="result" class="placeholder">Paste a job description and click "Find Matches".</div>
        </div>
    </div>

    <script src="job_match.js"></script>

</body>
</html>
