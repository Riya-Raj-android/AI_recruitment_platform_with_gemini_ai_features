<!DOCTYPE html>
<html>
<head>
    <title>Job Match - AI Recruitment Platform</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="topbar" id="siteHeader"></header>

    <div class="page">
        <h2 class="section-title">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg>
            Match Candidates to a Job
        </h2>
        <p class="section-sub">Paste a job description and see how every uploaded candidate scores against it.</p>

        <div class="card">
            <label for="jobDescription">Job Description</label>
            <textarea id="jobDescription" placeholder="Paste the job description here..."></textarea>
            <button type="button" onclick="matchJob()">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                Find Matches
            </button>
        </div>

        <div class="card">
            <h3><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg>Results</h3>
            <div id="result" class="placeholder">Paste a job description and click "Find Matches".</div>
        </div>
    </div>

    <script src="icons.js"></script>
    <script>injectHeader("job_match.html");</script>
    <script src="job_match.js"></script>

</body>
</html>
